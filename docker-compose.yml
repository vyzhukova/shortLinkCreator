version: '1.0'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
  app:
    build: .
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db/urlshortener
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-secret-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app   
volumes:
  postgres_data: